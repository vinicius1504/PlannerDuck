services:
  postgres:
    image: postgres:16-alpine
    container_name: plannerduck-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: your_user
      POSTGRES_PASSWORD: your_password
      POSTGRES_DB: plannerduck
    volumes:
      - pgdata:/var/lib/postgresql/data

  evolution-api:
    image: evoapicloud/evolution-api:v2.3.1
    container_name: plannerduck-evolution
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - SERVER_URL=http://localhost:8080
      - AUTHENTICATION_API_KEY=your-evolution-api-key
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://evolution:your_password@evolution-db:5432/evolution
      - DATABASE_CONNECTION_CLIENT_NAME=evolution
      - DATABASE_SAVE_DATA_INSTANCE=true
      - DATABASE_SAVE_DATA_NEW_MESSAGE=true
      - DATABASE_SAVE_DATA_CONTACTS=true
      - DATABASE_SAVE_DATA_CHATS=true
      - LOG_LEVEL=WARN
    depends_on:
      evolution-db:
        condition: service_healthy
    volumes:
      - evolution_instances:/evolution/instances

  nginx:
    image: nginx:alpine
    container_name: plannerduck-nginx
    restart: unless-stopped
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

  evolution-db:
    image: postgres:16-alpine
    container_name: plannerduck-evolution-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: evolution
      POSTGRES_PASSWORD: your_password
      POSTGRES_DB: evolution
    volumes:
      - evolution_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evolution"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  evolution_pgdata:
  evolution_instances:
